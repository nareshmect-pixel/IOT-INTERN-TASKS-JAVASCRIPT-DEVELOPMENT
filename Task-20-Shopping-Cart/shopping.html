<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="shopping.css">
</head>
<body>

<div class="container">

    <h2>Shopping Cart</h2>

    <div class="product">
        <span>Laptop - ₹50000</span>
        <button onclick="addToCart('Laptop',50000)">
            Add
        </button>
    </div>

    <div class="product">
        <span>Mouse - ₹500</span>
        <button onclick="addToCart('Mouse',500)">
            Add
        </button>
    </div>

    <div class="product">
        <span>Keyboard - ₹1000</span>
        <button onclick="addToCart('Keyboard',1000)">
            Add
        </button>
    </div>

    <h3>Cart Items</h3>

    <ul id="cartList"></ul>

    <h3 id="total">
        Total: ₹0
    </h3>

</div>

<script src="shopping.js"></script>

</body>
</html>
