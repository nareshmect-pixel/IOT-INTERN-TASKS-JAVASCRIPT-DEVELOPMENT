<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Widgets</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="dashboard">

    <h1>Admin Dashboard</h1>

    <div class="widgets">

        <div class="widget">
            <h2>Total Users</h2>
            <p id="users">1200</p>
        </div>

        <div class="widget">
            <h2>Total Sales</h2>
            <p id="sales">₹50,000</p>
        </div>

        <div class="widget">
            <h2>Orders</h2>
            <p id="orders">320</p>
        </div>

        <div class="widget">
            <h2>Notifications</h2>
            <p id="notifications">15</p>
        </div>

    </div>

    <button onclick="updateData()">
        Refresh Dashboard
    </button>

</div>

<script src="dashboard.js"></script>

</body>
</html>
