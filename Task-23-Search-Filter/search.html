<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Filter</title>
    <link rel="stylesheet" href="search.css">
</head>
<body>

<div class="container">

    <h2>Search Filter</h2>

    <input
        type="text"
        id="searchInput"
        placeholder="Search..."
        onkeyup="filterItems()">

    <ul id="itemList">
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
        <li>Orange</li>
        <li>Pineapple</li>
        <li>Grapes</li>
        <li>Watermelon</li>
    </ul>

</div>

<script src="search.js"></script>

</body>
</html>
