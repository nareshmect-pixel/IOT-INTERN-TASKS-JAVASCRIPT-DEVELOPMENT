<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record System</title>
    <link rel="stylesheet" href="studentre.css">
</head>
<body>

<div class="container">

    <h2>Student Record System</h2>

    <input type="text"
           id="name"
           placeholder="Student Name">

    <input type="number"
           id="age"
           placeholder="Age">

    <input type="text"
           id="course"
           placeholder="Course">

    <button onclick="addStudent()">
        Add Student
    </button>

    <table id="studentTable">

        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
            <th>Actions</th>
        </tr>

    </table>

</div>

<script src="studentre.js"></script>

</body>
</html>
